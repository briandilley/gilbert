# Gilbert — bootstrap configuration
#
# Only settings needed before entity storage is available live here.
# All other configuration is managed at runtime via the web UI at
# /settings and stored in entity storage.
#
# To override these bootstrap values for your installation, create
# .gilbert/config.yaml (gitignored — your customizations stay local).

storage:
  backend: sqlite
  connection: .gilbert/gilbert.db

logging:
  level: INFO
  file: .gilbert/gilbert.log
  ai_log_file: .gilbert/ai_calls.log
  loggers: {}

web:
  host: "0.0.0.0"
  port: 8000

plugins:
  # Directories scanned for local plugins at startup. Each subdirectory
  # with a plugin.yaml is loaded. The path is relative to the repo root
  # (the working directory when gilbert is launched).
  directories:
    - plugins
