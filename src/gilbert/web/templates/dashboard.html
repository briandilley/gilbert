{% extends "base.html" %}
{% block title %}Gilbert — Dashboard{% endblock %}
{% block content %}
<h1>Dashboard</h1>
<div class="card-grid">
    {% for card in cards %}
    <a href="{{ card.url }}" class="card{% if card.get('disabled') %} disabled{% endif %}">
        <span class="card-icon">{{ card.icon | safe }}</span>
        <h2>{{ card.title }}</h2>
        <p>{{ card.description }}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
